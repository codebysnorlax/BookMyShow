<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body { font-family: "Outfit", sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">

    <!-- Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm px-4">
      <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-6 w-full max-w-xs text-center">
        <div class="text-3xl mb-3">🎟️</div>
        <h3 class="text-lg font-bold text-white mb-1">Confirm Booking</h3>
        <p class="text-slate-400 text-sm mb-5">Are you sure you want to book <span id="confirmSeatLabel" class="text-emerald-400 font-bold"></span>?</p>
        <div class="flex gap-3">
          <button onclick="closeConfirm(false)" class="flex-1 py-2 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 text-sm font-semibold transition-all">Cancel</button>
          <button onclick="closeConfirm(true)" class="flex-1 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-white text-sm font-semibold transition-all active:scale-95">Book It</button>
        </div>
      </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm px-4">
      <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-6 w-full max-w-xs">
        <h2 class="text-xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-5">ChaiCode Cinema</h2>
        <div class="flex rounded-xl overflow-hidden border border-slate-700 mb-5">
          <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 text-sm font-semibold bg-emerald-500 text-white transition-all">Login</button>
          <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 text-sm font-semibold bg-slate-700 text-slate-400 transition-all">Register</button>
        </div>
        <div id="authError" class="hidden text-rose-400 text-xs text-center mb-3"></div>
        <input id="authUsername" type="text" placeholder="Username" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-emerald-500 transition-colors" />
        <input id="authPassword" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm mb-4 outline-none focus:border-emerald-500 transition-colors" />
        <button onclick="submitAuth()" id="authBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-semibold py-2.5 rounded-xl transition-all active:scale-95 text-sm">Login</button>
      </div>
    </div>

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur border-b border-slate-700/50 px-4 py-3 flex items-center justify-between">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 font-bold text-base sm:text-lg">🎬 ChaiCode Cinema</span>
      <div class="flex items-center gap-2">
        <span id="userLabel" class="text-emerald-400 text-xs sm:text-sm font-semibold"></span>
        <span id="balanceLabel" class="text-yellow-400 text-xs sm:text-sm font-semibold hidden"></span>
        <button onclick="logout()" id="logoutBtn" class="hidden text-xs text-slate-400 hover:text-rose-400 border border-slate-700 hover:border-rose-500 px-3 py-1 rounded-full transition-all">Logout</button>
      </div>
    </nav>

    <!-- Main -->
    <div class="flex flex-col items-center px-4 py-6 gap-6">

      <!-- Movie Info -->
      <div class="text-center">
        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight leading-snug">
          Now Showing
        </h1>
        <p class="text-red-400 font-bold text-lg sm:text-xl mt-1">Dhurandhar The Revenge</p>
        <p class="text-slate-400 text-sm mt-1">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <!-- Legend -->
      <div class="bg-slate-900/50 rounded-full px-5 py-2 border border-slate-700 flex gap-4 items-center text-sm flex-wrap justify-center">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.6)]"></div>
          <span class="text-slate-300 font-medium">VIP Sofa</span>
        </div>
        <div class="w-px h-4 bg-slate-700"></div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></div>
          <span class="text-slate-300 font-medium">Available</span>
        </div>
        <div class="w-px h-4 bg-slate-700"></div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
          <span class="text-slate-400 font-medium">Booked</span>
        </div>
      </div>

      <!-- Coupon -->
      <div id="couponSection" class="hidden flex gap-2 items-center">
        <input id="couponInput" type="text" placeholder="Coupon code" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm outline-none focus:border-yellow-400 transition-colors uppercase w-36" />
        <button onclick="applyCoupon()" class="bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-semibold text-sm px-4 py-2 rounded-xl transition-all active:scale-95">Apply</button>
        <span id="couponMsg" class="text-xs font-semibold"></span>
      </div>

      <!-- Screen indicator -->
      <div class="w-full max-w-2xl">
        <div class="h-1.5 rounded-full bg-gradient-to-r from-transparent via-emerald-400/60 to-transparent mb-1"></div>
        <p class="text-center text-xs text-slate-500 tracking-widest uppercase">Screen</p>
      </div>

      <!-- Seats -->
      <div class="bg-slate-900/40 p-4 sm:p-6 rounded-2xl border border-slate-700/50 shadow-inner w-full max-w-2xl overflow-x-auto">
        <table id="tbl" class="border-separate border-spacing-1.5 sm:border-spacing-2 mx-auto"></table>
      </div>

    </div>

    <script>
      let currentTab = "login";
      let confirmResolve = null;
      let currentUser = null; // { id, username, balance }
      let csrfToken = null;

      async function getCsrfToken() {
        if (csrfToken) return csrfToken;
        const res = await fetch("/csrf-token", { credentials: "include" });
        const data = await res.json();
        csrfToken = data.csrfToken;
        return csrfToken;
      }

      function mutateHeaders() {
        return { "Content-Type": "application/json", "x-csrf-token": csrfToken };
      }

      // ── Session restore on page load ──────────────────────────────────────
      (async () => {
        await getCsrfToken();
        const res = await fetch("/auth/me", { credentials: "include" });
        if (res.ok) {
          currentUser = await res.json();
          document.getElementById("authModal").classList.add("hidden");
          setUser(currentUser.username, currentUser.balance);
          run();
        }
        // 401 → stay on auth modal (default state)
      })();

      // ── Confirm modal ─────────────────────────────────────────────────────
      function confirmBooking(seatId, price) {
        document.getElementById("confirmSeatLabel").textContent = `Seat ${seatId} — $${price}`;
        document.getElementById("confirmModal").classList.remove("hidden");
        return new Promise(resolve => { confirmResolve = resolve; });
      }

      function closeConfirm(result) {
        document.getElementById("confirmModal").classList.add("hidden");
        if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
      }

      // ── Auth modal ────────────────────────────────────────────────────────
      function switchTab(tab) {
        currentTab = tab;
        const isLogin = tab === "login";
        document.getElementById("tabLogin").className = `flex-1 py-2 text-sm font-semibold transition-all ${isLogin ? "bg-emerald-500 text-white" : "bg-slate-700 text-slate-400"}`;
        document.getElementById("tabRegister").className = `flex-1 py-2 text-sm font-semibold transition-all ${!isLogin ? "bg-emerald-500 text-white" : "bg-slate-700 text-slate-400"}`;
        document.getElementById("authBtn").textContent = isLogin ? "Login" : "Register";
        document.getElementById("authError").classList.add("hidden");
      }

      async function submitAuth() {
        const username = document.getElementById("authUsername").value.trim();
        const password = document.getElementById("authPassword").value.trim();
        if (!username || !password) { showAuthError("Please fill in all fields"); return; }

        const endpoint = currentTab === "login" ? "/auth/login" : "/auth/register";
        const res = await fetch(endpoint, {
          method: "POST",
          headers: mutateHeaders(),
          credentials: "include",
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { showAuthError(data.error || "Something went wrong"); return; }

        if (currentTab === "register") {
          showAuthError("Registered! Please login.");
          switchTab("login");
          return;
        }

        // Login success — cookie is set by server, fetch profile
        currentUser = { username: data.username, balance: data.balance };
        document.getElementById("authModal").classList.add("hidden");
        setUser(data.username, data.balance);
        run();
      }

      function showAuthError(msg) {
        const el = document.getElementById("authError");
        el.textContent = msg;
        el.classList.remove("hidden");
      }

      // ── Coupon ────────────────────────────────────────────────────────────
      async function applyCoupon() {
        const code = document.getElementById("couponInput").value.trim();
        const msg = document.getElementById("couponMsg");
        if (!code) return;
        const res = await fetch("/coupon", {
          method: "POST",
          headers: mutateHeaders(),
          credentials: "include",
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.error;
          msg.className = "text-xs font-semibold text-rose-400";
        } else {
          msg.textContent = data.message;
          msg.className = "text-xs font-semibold text-emerald-400";
          currentUser.balance = data.newBalance;
          document.getElementById("balanceLabel").textContent = `💰 $${data.newBalance}`;
          document.getElementById("couponInput").value = "";
        }
      }

      // ── UI helpers ────────────────────────────────────────────────────────
      function setUser(username, balance) {
        document.getElementById("userLabel").textContent = `👤 ${username}`;
        document.getElementById("logoutBtn").classList.remove("hidden");
        document.getElementById("couponSection").classList.remove("hidden");
        if (balance !== undefined) {
          document.getElementById("balanceLabel").textContent = `💰 $${balance}`;
          document.getElementById("balanceLabel").classList.remove("hidden");
        }
      }

      async function logout() {
        await fetch("/auth/logout", { method: "POST", headers: mutateHeaders(), credentials: "include" });
        currentUser = null;
        csrfToken = null;
        document.getElementById("tbl").innerHTML = "";
        document.getElementById("userLabel").textContent = "";
        document.getElementById("balanceLabel").textContent = "";
        document.getElementById("balanceLabel").classList.add("hidden");
        document.getElementById("couponSection").classList.add("hidden");
        document.getElementById("couponMsg").textContent = "";
        document.getElementById("logoutBtn").classList.add("hidden");
        document.getElementById("authUsername").value = "";
        document.getElementById("authPassword").value = "";
        document.getElementById("authError").classList.add("hidden");
        switchTab("login");
        document.getElementById("authModal").classList.remove("hidden");
      }

      // ── Seat grid ─────────────────────────────────────────────────────────
      async function run() {
        const tbl = document.getElementById("tbl");
        tbl.innerHTML = "";
        const res = await fetch("/seats", { credentials: "include" });
        const seats = (await res.json()).sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < seats.length; i++) {
          if (i % 5 === 0) { tr = document.createElement("tr"); tbl.appendChild(tr); }
          const seat = seats[i];
          const isSofa = seat.type === "sofa";
          const sofaPos = isSofa ? (i % 5) : -1;
          const sofaRound = sofaPos === 0 ? "rounded-l-2xl rounded-r-sm" :
                            sofaPos === 1 ? "rounded-r-2xl rounded-l-sm" :
                            sofaPos === 2 ? "rounded-2xl" :
                            sofaPos === 3 ? "rounded-l-2xl rounded-r-sm" :
                            sofaPos === 4 ? "rounded-r-2xl rounded-l-sm" : "rounded-xl";
          const tdPad = (sofaPos === 0 || sofaPos === 3) ? "pr-[1px]" :
                        (sofaPos === 1 || sofaPos === 4) ? "pl-[1px]" : "";
          const td = document.createElement("td");
          td.className = `p-1 ${tdPad}`;

          const base = isSofa
            ? `w-14 h-12 sm:w-20 sm:h-14 md:w-24 md:h-16 ${sofaRound} inline-flex flex-col items-center justify-center text-sm font-bold transition-all duration-300 select-none relative group`
            : `w-10 h-10 sm:w-14 sm:h-14 md:w-16 md:h-16 rounded-xl inline-flex flex-col items-center justify-center text-sm sm:text-base md:text-lg font-bold transition-all duration-300 select-none relative group`;

          const el = document.createElement("div");

          if (seat.isbooked) {
            el.className = `${base} ${isSofa ? "bg-purple-500/10 text-purple-400/50 border border-purple-500/20" : "bg-rose-500/10 text-rose-500/60 border border-rose-500/20"} cursor-not-allowed`;
            el.innerHTML = `
              <span>${isSofa ? "🛋️" : seat.id}</span>
              <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-slate-900 border border-slate-700 text-xs text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none">
                Booked by: <span class="font-bold text-white ml-1">${seat.booked_by ?? "someone"}</span>
                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[5px] border-transparent border-t-slate-700"></div>
              </div>`;
          } else if (isSofa) {
            el.className = `${base} bg-gradient-to-br from-purple-600 to-violet-700 text-white border-2 border-purple-400 shadow-[0_0_16px_rgba(168,85,247,0.4)] cursor-pointer hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(168,85,247,0.6)] active:scale-95`;
            el.innerHTML = `<span>🛋️</span><span class="text-[10px] font-normal opacity-90">$${seat.price}</span>`;
          } else {
            el.className = `${base} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_12px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1 hover:shadow-[0_8px_20px_rgba(16,185,129,0.5)] active:scale-95`;
            el.innerHTML = `<span>${seat.id}</span><span class="text-[10px] font-normal opacity-80">$${seat.price}</span>`;
          }

          el.addEventListener("click", async function () {
            if (el.classList.contains("cursor-not-allowed")) return;
            const confirmed = await confirmBooking(seat.id, seat.price);
            if (!confirmed) return;
            const res = await fetch(`/seats/${seat.id}`, {
              method: "PUT",
              headers: mutateHeaders(),
              credentials: "include",
            });              method: "PUT",
              credentials: "include",
            });
            const data = await res.json();
            if (!res.ok) {
              alert(data.error);
            } else {
              currentUser.balance = data.newBalance;
              document.getElementById("balanceLabel").textContent = `💰 $${data.newBalance}`;
              el.className = `${base} ${isSofa ? "bg-purple-500/10 text-purple-400/50 border border-purple-500/20" : "bg-rose-500/10 text-rose-500/60 border border-rose-500/20"} cursor-not-allowed`;
              el.innerHTML = `
                <span>${isSofa ? "🛋️" : seat.id}</span>
                <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-slate-900 border border-slate-700 text-xs text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none">
                  Booked by: <span class="font-bold text-white ml-1">${currentUser.username}</span>
                  <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[5px] border-transparent border-t-slate-700"></div>
                </div>`;
            }
          });

          td.appendChild(el);
          tr.appendChild(td);
        }
      }
    </script>
  </body>
</html>
